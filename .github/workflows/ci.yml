name: CI

on:
  push:
    branches: [master, main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild build \
            -project NcduUI.xcodeproj \
            -scheme NcduUI \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-"

      - name: Package zip
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: package
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' build/DerivedData/Build/Products/Release/NcduUI.app/Contents/Info.plist)
          ZIP="NcduUI-${VERSION}-macOS-unsigned.zip"
          ditto -c -k --keepParent build/DerivedData/Build/Products/Release/NcduUI.app "build/${ZIP}"
          echo "zip=build/${ZIP}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ncduui-unsigned
          path: ${{ steps.package.outputs.zip }}
